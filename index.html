<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young Engineer Life</title>
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('p22-zaner-four.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'MenuFont';
            src: url('MenoDisplay-Light.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f8f8f8;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }
        .title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 2.5rem;
            font-weight: bold;
            text-align: left;
            margin: 0 0 3px 0;
            padding: 0 0 0 5px;
            color: black;
            letter-spacing: 0em;
            line-height: 1.3;
        }
        .title-underline {
            width: 100%;
            height: 1px;
            background-color: black;
            margin: 0 0 10px 0;
        }
        .gif-container {
            width: 130px;
            height: 40px;
            overflow: hidden;
            margin: 0 auto;
        }
        .gif-container img {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
            top: -18px;
        }
        .gif-underline {
            width: 130px;
            height: 1px;
            background-color: black;
            margin: 10px auto 20px auto;
        }
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 25px;
            font-size: 1rem;
            font-family: 'MenuFont', Arial, sans-serif;
        }
        .nav-item {
            color: black;
            text-decoration: none;
            font-weight: normal;
        }
        .nav-item.active {
            font-weight: bold;
        }

        /* Page sections */
        .page-section {
            max-width: 1000px;
            margin: 30px auto 0;
        }
        .section-heading {
            font-family: 'MenuFont', Arial, sans-serif;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        /* Desktop: gallery grid */
        .games-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .game-card {
            display: block;
            text-decoration: none;
            color: black;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: transform 0.15s ease;
        }
        .game-card:hover {
            transform: translateY(-4px);
        }
        .game-card img {
            width: 100%;
            display: block;
            aspect-ratio: 4 / 3;
            object-fit: cover;
        }
        .game-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .game-title {
            font-family: 'MenuFont', Arial, sans-serif;
            font-weight: bold;
        }
        .game-subtitle {
            font-size: 0.85rem;
            color: #555;
        }

        /* Mobile: vertical scroll, full-width post-style cards */
        @media (max-width: 600px) {
            .games-gallery {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .game-card img {
                aspect-ratio: 16 / 9;
            }
        }
    </style>
</head>
<body>
    <h1 class="title">Yel</h1>
    <div class="title-underline"></div>

    <div class="gif-container">
        <img src="cool.gif" alt="Your awesome GIF">
    </div>
    <div class="gif-underline"></div>

    <nav class="nav-menu">
        <a href="#home" class="nav-item" onclick="setActive(this)">Home</a>
        <a href="#blog" class="nav-item" onclick="setActive(this)">Blog</a>
        <a href="#moodboard" class="nav-item" onclick="setActive(this)">Moodboard</a>
        <a href="#socials" class="nav-item" onclick="setActive(this)">Socials</a>
    </nav>

    <section id="home" class="page-section">
        <p>Welcome to my corner of the internet.</p>
    </section>

    <section id="blog" class="page-section" style="display:none;">
        <p>Blog coming soon.</p>
    </section>

    <section id="moodboard" class="page-section" style="display:none;">
        <p>Moodboard coming soon.</p>
    </section>

    <section id="socials" class="page-section" style="display:none;">
        <h2 class="section-heading">Games</h2>
        <div class="games-gallery">
            <a class="game-card" href="https://execelia.itch.io/espionage" target="_blank" rel="noopener">
                <img src="https://img.itch.zone/aW1nLzI3MzE0MjcyLnBuZw==/original/88sr46.png" alt="ESPIONAGE cover">
                <div class="game-info">
                    <span class="game-title">ESPIONAGE</span>
                    <span class="game-subtitle">Espionage: Azurium Files</span>
                </div>
            </a>
            <a class="game-card" href="https://execelia.itch.io/memorabilia" target="_blank" rel="noopener">
                <img src="https://img.itch.zone/aW1nLzI0MDc2Mzc0LnBuZw==/original/gwQOJp.png" alt="Memorabilia cover">
                <div class="game-info">
                    <span class="game-title">Memorabilia</span>
                    <span class="game-subtitle">a dreamscape</span>
                </div>
            </a>
        </div>
    </section>

    <script>
        function setActive(clickedItem) {
            // Remove active class from all nav items
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            // Add active class to clicked item
            clickedItem.classList.add('active');

            // Hide all sections, show the matching one
            document.querySelectorAll('.page-section').forEach(section => {
                section.style.display = 'none';
            });
            const target = document.querySelector(clickedItem.getAttribute('href'));
            if (target) target.style.display = 'block';
        }

        // Set Home as active on page load
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.nav-item').classList.add('active');
        });
    </script>
</body>
</html>
